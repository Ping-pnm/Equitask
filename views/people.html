<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equitask - People</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public/style.css">
</head>

<body class="homepage-body">
    <div class="layout-container" style="flex-direction: column;">
        <!-- Top layer: Grey rectangle -->
        <header class="top-header"
            style="display: flex; align-items: center; padding: 10px 30px; height: 85px; flex-shrink: 0; background: #e9ecf3;">
            <div class="logo-area" style="display: flex; align-items: center; padding: 0;">
                <div class="logo-icon-wrapper"
                    style="background: transparent; box-shadow: none; width: 65px; height: 65px;">
                    <img src="../public/assets/logo-primary.png" alt="E Logo" class="side-logo-img"
                        style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <img src="../public/assets/logo-word.png" alt="Equitask" class="logo-text"
                    style="height: 35px; object-fit: contain; margin-left: 10px;">
            </div>
        </header>

        <!-- Bottom layer: Sidebar + Main -->
        <div class="content-wrapper" style="display: flex; flex-grow: 1; overflow: hidden;">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="class-list-container">
                    <ul id="class-list" class="class-list">
                        <li><a href="#" class="class-item active">Class 1</a></li>
                        <li><a href="#" class="class-item">Class 2</a></li>
                    </ul>
                </div>

                <button id="btn-create-class" class="btn-create-class-sidebar"
                    onclick="openModal('modal-create-class')">+ Create New Class</button>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Tabs Navbar -->
                <header class="top-nav">
                    <nav class="tabs">
                        <a href="homepage.html" class="tab-item">Stream</a>
                        <a href="classwork.html" class="tab-item">Work</a>
                        <a href="people.html" class="tab-item active">People</a>
                        <a href="dashboard.html" class="tab-item">Dashboard</a>
                    </nav>
                </header>

                <!-- People Content -->
                <section class="people-content"
                    style="padding: 40px; max-width: 800px; margin: 0 auto; width: 100%; overflow-y: auto;">

                    <!-- Leaders Section -->
                    <div class="people-section" style="margin-bottom: 40px;">
                        <div class="section-header"
                            style="display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #56c4df; padding-bottom: 5px; margin-bottom: 20px;">
                            <h2 style="color: #56c4df; font-size: 32px; font-weight: 700; margin: 0;">Leaders</h2>
                            <!-- Add User SVG -->
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#56c4df"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                style="margin-bottom: 5px; cursor: pointer;">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="8.5" cy="7" r="4"></circle>
                                <line x1="20" y1="8" x2="20" y2="14"></line>
                                <line x1="23" y1="11" x2="17" y2="11"></line>
                            </svg>
                        </div>
                        <div class="people-list" style="display: flex; flex-direction: column; gap: 15px;">
                            <div class="person-row" style="display: flex; align-items: center; gap: 20px;">
                                <!-- Avatar SVG -->
                                <svg width="45" height="45" viewBox="0 0 45 45" fill="none">
                                    <circle cx="22.5" cy="22.5" r="22.5" fill="#777777" />
                                    <circle cx="22.5" cy="16" r="6" fill="#ffffff" />
                                    <path
                                        d="M10.5 35.5C10.5 28.5 15.5 25 22.5 25C29.5 25 34.5 28.5 34.5 35.5V36.5H10.5V35.5Z"
                                        fill="#ffffff" />
                                </svg>
                                <span style="font-size: 20px; font-weight: 700; color: #222;">Sasiporn Usanavasin</span>
                            </div>
                        </div>
                    </div>

                    <!-- Members Section -->
                    <div class="people-section">
                        <div class="section-header"
                            style="display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #56c4df; padding-bottom: 5px; margin-bottom: 15px;">
                            <h2 style="color: #56c4df; font-size: 32px; font-weight: 700; margin: 0;">Members</h2>
                            <!-- Add User SVG -->
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#56c4df"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                style="margin-bottom: 5px; cursor: pointer;">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="8.5" cy="7" r="4"></circle>
                                <line x1="20" y1="8" x2="20" y2="14"></line>
                                <line x1="23" y1="11" x2="17" y2="11"></line>
                            </svg>
                        </div>

                        <div class="members-actions"
                            style="display: flex; align-items: center; gap: 25px; margin-bottom: 25px; padding-left: 2px;">
                            <div
                                style="display: flex; align-items: center; gap: 8px; color: #56c4df; font-weight: 700; cursor: pointer; font-size: 15px;">
                                <div
                                    style="width: 22px; height: 22px; border: 2.5px solid #56c4df; border-radius: 3px;">
                                </div>
                                Select All
                            </div>
                            <div
                                style="display: flex; align-items: center; gap: 8px; color: #56c4df; font-weight: 700; cursor: pointer; font-size: 15px;">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#56c4df"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path
                                        d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                    </path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg>
                                Delete
                            </div>
                        </div>

                        <div class="people-list" style="display: flex; flex-direction: column; gap: 25px;">
                            <!-- Member 1 -->
                            <div class="person-row" style="display: flex; align-items: center; gap: 20px;">
                                <div
                                    style="width: 22px; height: 22px; border: 2.5px solid #56c4df; border-radius: 3px; cursor: pointer;">
                                </div>
                                <!-- Avatar SVG -->
                                <svg width="45" height="45" viewBox="0 0 45 45" fill="none">
                                    <circle cx="22.5" cy="22.5" r="22.5" fill="#777777" />
                                    <circle cx="22.5" cy="16" r="6" fill="#ffffff" />
                                    <path
                                        d="M10.5 35.5C10.5 28.5 15.5 25 22.5 25C29.5 25 34.5 28.5 34.5 35.5V36.5H10.5V35.5Z"
                                        fill="#ffffff" />
                                </svg>
                                <span style="font-size: 20px; font-weight: 700; color: #222;">Phinnawat
                                    Yaemsanguan</span>
                            </div>

                            <!-- Member 2 -->
                            <div class="person-row" style="display: flex; align-items: center; gap: 20px;">
                                <div
                                    style="width: 22px; height: 22px; border: 2.5px solid #56c4df; border-radius: 3px; cursor: pointer;">
                                </div>
                                <!-- Avatar SVG -->
                                <svg width="45" height="45" viewBox="0 0 45 45" fill="none">
                                    <circle cx="22.5" cy="22.5" r="22.5" fill="#777777" />
                                    <circle cx="22.5" cy="16" r="6" fill="#ffffff" />
                                    <path
                                        d="M10.5 35.5C10.5 28.5 15.5 25 22.5 25C29.5 25 34.5 28.5 34.5 35.5V36.5H10.5V35.5Z"
                                        fill="#ffffff" />
                                </svg>
                                <span style="font-size: 20px; font-weight: 700; color: #222;">Napha
                                    Mongkolwittayakul</span>
                            </div>

                            <!-- Member 3 -->
                            <div class="person-row" style="display: flex; align-items: center; gap: 20px;">
                                <div
                                    style="width: 22px; height: 22px; border: 2.5px solid #56c4df; border-radius: 3px; cursor: pointer;">
                                </div>
                                <!-- Avatar SVG -->
                                <svg width="45" height="45" viewBox="0 0 45 45" fill="none">
                                    <circle cx="22.5" cy="22.5" r="22.5" fill="#777777" />
                                    <circle cx="22.5" cy="16" r="6" fill="#ffffff" />
                                    <path
                                        d="M10.5 35.5C10.5 28.5 15.5 25 22.5 25C29.5 25 34.5 28.5 34.5 35.5V36.5H10.5V35.5Z"
                                        fill="#ffffff" />
                                </svg>
                                <span style="font-size: 20px; font-weight: 700; color: #222;">Takorn
                                    Sripetcharakul</span>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <!-- Create Class Modal -->
    <div id="modal-create-class" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Create class</h2>
            <form id="form-create-class" onsubmit="handleCreateClass(event)">
                <div class="input-group">
                    <input type="text" id="class-name" placeholder="Class name (required)" required>
                </div>
                <div class="input-group">
                    <input type="text" id="class-section" placeholder="Section">
                </div>
                <div class="input-group">
                    <input type="text" id="class-subject" placeholder="Subject">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal('modal-create-class')">Cancel</button>
                    <button type="submit" class="btn-submit blue-text">Create</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../public/script.js"></script>
</body>

</html>
