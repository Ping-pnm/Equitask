<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Equitask - Login to your account">
    <title>Equitask - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public/assets/style.css">
</head>
<body>

    <div class="login-card">
        <!-- Logo -->
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <img src="../public/assets/Logo.png" alt="Equitask Logo" id="logo-image" class="logo-image">
        </div>

        <!-- Form -->
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <input type="email" id="email-input" placeholder="Your email......." autocomplete="email" required>
            </div>
            <div class="form-group">
                <input type="password" id="password-input" placeholder="Password......" autocomplete="current-password" required>
            </div>

            <!-- Buttons -->
            <div class="buttons-container">
                <a href="register.html" class="btn btn-register" id="register-btn">Register</a>
                <button type="submit" class="btn btn-login" id="login-btn">Login</button>
            </div>
        </form>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            // Navigate to homepage on login
            window.location.href = 'homepage.html';
        }
    </script>

</body>
</html>
